<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Christmas Lights Simulator</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <main class="app-shell">
    <h1>Christmas Lights Simulator</h1>
    <p class="subtitle">A simple festive lightshow.</p>

    <section class="lights-panel" aria-label="Christmas lights display">
      <div id="containerDiv"></div>
    </section>

    <section class="controls-panel" aria-label="Lightshow controls">
      <p class="speed-status">Current speed: <span id="speedValue">Normal</span></p>

      <div id="actionButtonsDiv">
        <button id="startButton">Start Light show</button>
        <button id="stopButton">Stop Light show</button>
      </div>

      <div id="intensityButtonsDiv">
        <button id="addIntensity">Faster</button>
        <button id="reduceIntensity">Slower</button>
      </div>
    </section>
  </main>
  <script src="index.js"></script>
</body>
</html>
